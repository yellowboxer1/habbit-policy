<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>해빗 정책 문서</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17202a;
      --muted: #667085;
      --line: #e6e9ef;
      --accent: #14b8a6;
      --bg: #fbfcfd;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.65;
    }
    main {
      width: min(760px, calc(100% - 40px));
      margin: 0 auto;
      padding: 64px 0;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      line-height: 1.2;
    }
    p { color: var(--muted); }
    nav {
      display: grid;
      gap: 12px;
      margin-top: 32px;
    }
    a {
      display: block;
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
      text-decoration: none;
      font-weight: 700;
    }
    a span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
    }
    a:hover { border-color: var(--accent); }
  </style>
</head>
<body>
  <main>
    <h1>해빗 정책 문서</h1>
    <p>해빗 앱의 개인정보 처리방침, 제3자 제공 및 처리위탁 동의, 이용약관, 계정 및 데이터 삭제 안내를 확인할 수 있습니다.</p>
    <nav aria-label="정책 문서">
      <a href="./privacy/">개인정보 처리방침<span>Privacy Policy</span></a>
      <a href="./third-party-consent/">개인정보 제3자 제공 및 처리위탁 동의<span>Third-Party Consent</span></a>
      <a href="./terms/">이용약관<span>Terms of Service</span></a>
      <a href="./data-deletion/">계정 및 데이터 삭제 안내<span>Account and Data Deletion</span></a>
    </nav>
  </main>
</body>
</html>
